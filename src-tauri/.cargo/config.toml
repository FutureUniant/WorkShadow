# Lance lance-* crates compile protobuf at build time. grpc-tools' Node protoc wrapper
# lacks include paths; Unicode project paths also break protoc on Windows.
# Run `npm run tauri:setup-protoc` once, then this wrapper uses %LOCALAPPDATA%\workshadow-protoc.
[env]
PROTOC = { value = "tools/protoc-wrapper.cmd", relative = true }
